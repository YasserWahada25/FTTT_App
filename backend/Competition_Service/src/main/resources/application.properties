spring.datasource.url=jdbc:mysql://localhost:3306/Competition_Service_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Sans Eureka en local : activer le profil "local" (voir application-local.properties).

# Configuration du serveur
server.port=8081

# Configuration de l'application
spring.application.name=competition-service

# Disable Spring Cloud Config for local development
spring.cloud.config.enabled=false

# Logs
logging.level.com.FTTT.Competition_Service=DEBUG

# JWT Keycloak (aligné sur Auth-Service)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/fttapp
