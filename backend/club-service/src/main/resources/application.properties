spring.application.name=club-service
server.port=9002


spring.datasource.url=jdbc:mysql://mysql-db:3306/club_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update


eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# OpenFeign timeouts
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# Logs Feign
logging.level.com.FTTTApp.club_service.Client.TerrainClient=DEBUG

# ===============================
# Config server
# ===============================
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false

# JWT Keycloak (même realm que Auth-Service)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/fttapp