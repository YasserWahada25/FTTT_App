spring.application.name=AUTH-SERVICE
spring.cloud.config.enabled=false

# EUREKA
eureka.client.service-url.defaultZone=http://eureka-service:8761/eureka/
eureka.client.register-with-eureka=true

server.port=8082

# DATABASE
spring.datasource.url=jdbc:mysql://mysql-db:3306/fttapp_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# KEYCLOAK
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:9090/realms/fttapp

keycloak.server-url=http://keycloak:9090
keycloak.realm=fttapp
keycloak.client-id=fttapp-backend
keycloak.client-secret=XXXX

profile.service-url=http://service-profile:8085