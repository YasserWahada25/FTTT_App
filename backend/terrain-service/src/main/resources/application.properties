spring.application.name=terrain-service
server.port=9008


spring.datasource.url=jdbc:mysql://localhost:3306/terrain_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# ===============================
# Config server
# ===============================
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false

# JWT Keycloak (même realm que les autres services)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/fttapp