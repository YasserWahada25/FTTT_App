spring.application.name=AUTH-SERVICE
spring.cloud.config.enabled=false


# ===============================
# EUREKA CLIENT
# ===============================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true


server.port=8082


# ===============================
# DATABASE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/fttapp_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SECURITY - KEYCLOAK JWT
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/fttapp


# ===============================
# KEYCLOAK ADMIN CONFIG
# ===============================
keycloak.server-url=http://localhost:9090
keycloak.realm=fttapp
keycloak.client-id=fttapp-backend
keycloak.client-secret=86diBIGbiFQVSJQeG8Lkdvyzp2nb7jhp

profile.service-url=http://localhost:8085
