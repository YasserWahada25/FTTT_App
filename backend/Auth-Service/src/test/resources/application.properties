# Contexte de test : base embarquée, pas d'Eureka, URL Feign factice
spring.datasource.url=jdbc:h2:mem:fttt_auth_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

eureka.client.enabled=false
feign.profile-service.url=http://127.0.0.1:8096

# Valeurs factices pour le chargement du contexte (Keycloak non appelé par les tests)
keycloak.server-url=http://127.0.0.1:9090
keycloak.realm=fttapp
keycloak.client-id=test
keycloak.client-secret=test
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://127.0.0.1:9090/realms/fttapp
