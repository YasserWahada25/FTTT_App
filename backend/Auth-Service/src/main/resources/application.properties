spring.application.name=AUTH-SERVICE
spring.cloud.config.enabled=false

# Défaut IntelliJ / Windows : MySQL sur localhost. Mot de passe vide = installation MySQL locale courante.
# Si root a un mot de passe, définis-le ici ou via SPRING_DATASOURCE_PASSWORD, ou profil "local" (application-local.properties).

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true

server.port=8082

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/fttapp_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# KEYCLOAK
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/fttapp

keycloak.server-url=http://localhost:9090
keycloak.realm=fttapp

keycloak.client-id=fttapp-backend
keycloak.client-secret=86diBIGbiFQVSJQeG8Lkdvyzp2nb7jhp


# OpenFeign → SERVICE-PROFILE (URL vide = Eureka ; ici URL directe pour le dev local)
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=10000
feign.profile-service.url=http://localhost:8096
